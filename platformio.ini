[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
build_type = debug

build_flags =
    -D TEENSY
    -w ; -Wall
    -I"C:/Users/spagh/Desktop/brain rot/C++/libraries/include/"
    -D _HAS_STD_BYTE=0
    -fexceptions ;  error: exception handling disabled, use '-fexceptions' to enable
    -Wno-psabi ; https://stackoverflow.com/questions/48149323/what-does-the-gcc-warning-parameter-passing-for-x-changed-in-gcc-7-1-mean

; usb: "usb features" https://docs.platformio.org/en/latest/platforms/teensy.html